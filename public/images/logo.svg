<svg xmlns="http://www.svg.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
    <!-- Building Icon -->
    <g transform="translate(10, 10)">
        <!-- Base line -->
        <path d="M 10 100 L 110 100" stroke="#000000" stroke-width="8" stroke-linecap="round"/>
        <!-- Buildings outlines -->
        <path d="M 40 100 L 40 15 L 75 40 L 75 100" fill="none" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
        <path d="M 20 100 L 20 60 L 40 45" fill="none" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
        <path d="M 75 60 L 95 75 L 95 100" fill="none" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
        
        <!-- Windows Building 1 (Middle) -->
        <rect x="48" y="35" width="8" height="8" fill="#000000"/>
        <rect x="60" y="35" width="8" height="8" fill="#000000"/>
        <rect x="48" y="50" width="8" height="8" fill="#000000"/>
        <rect x="60" y="50" width="8" height="8" fill="#000000"/>
        <rect x="48" y="65" width="8" height="8" fill="#000000"/>
        <rect x="60" y="65" width="8" height="8" fill="#000000"/>
        <rect x="48" y="80" width="8" height="8" fill="#000000"/>
        <rect x="60" y="80" width="8" height="8" fill="#000000"/>

        <!-- Windows Building 2 (Left) -->
        <rect x="26" y="65" width="8" height="8" fill="#000000"/>
        <rect x="26" y="80" width="8" height="8" fill="#000000"/>

        <!-- Windows Building 3 (Right) -->
        <rect x="80" y="80" width="8" height="8" fill="#000000"/>
    </g>

    <!-- Green Badge -->
    <g transform="translate(130, 20)">
        <rect x="0" y="0" width="250" height="80" rx="40" fill="#8dc63f"/>
        <text x="125" y="58" font-family="Arial, sans-serif" font-weight="bold" font-size="52" fill="#ffffff" text-anchor="middle" letter-spacing="2">+FELIZ</text>
    </g>
</svg>
